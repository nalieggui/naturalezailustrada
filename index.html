<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lupino · Vendedores</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --lupino:       #5a3d8a;
    --lupino-mid:   #7c5fa8;
    --lupino-light: #9b7ec8;
    --lupino-pale:  #e8dff5;
    --naranja:      #f07d3a;
    --naranja-dark: #d4622a;
    --arena:        #f5e6c8;
    --blanco:       #fdf9f4;
    --texto:        #3d3244;
    --gris:         #6b6572;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--blanco);
    color: var(--texto);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* ===== FONDO DECORATIVO ===== */
.bg-deco {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
}
.bg-deco::before {
    content: '';
    position: absolute;
    top: -120px; left: -80px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(124,95,168,0.12) 0%, transparent 70%);
    border-radius: 50%;
}
.bg-deco::after {
    content: '';
    position: absolute;
    bottom: -100px; right: -60px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(240,125,58,0.1) 0%, transparent 70%);
    border-radius: 50%;
}

/* ===== HEADER ===== */
.header {
    position: relative; z-index: 10;
    background: linear-gradient(135deg, var(--lupino) 0%, var(--lupino-mid) 60%, var(--lupino-light) 100%);
    padding: 28px 20px 24px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(90,61,138,0.3);
}
.header-logo-wrap {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    overflow: hidden;
}
.header-logo-wrap img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
}
.header-titulo {
    font-family: 'Playfair Display', serif;
    color: white;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
}
.header-sub {
    color: rgba(255,255,255,0.7);
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
}

/* ===== CONTENIDO ===== */
.contenido {
    position: relative; z-index: 1;
    flex: 1;
    padding: 24px 16px 32px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
}

.seccion-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--gris);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
    padding-left: 4px;
}

/* ===== BUSCADOR ===== */
.buscador-wrap {
    position: relative;
    margin-bottom: 20px;
}
.buscador-input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    border: 2px solid var(--naranja);
    border-radius: 50px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--texto);
    outline: none;
    background: #fff8f3;
    box-shadow: 0 2px 10px rgba(240,125,58,0.15);
    transition: border-color 0.2s, box-shadow 0.2s;
}
.buscador-input:focus {
    border-color: var(--naranja-dark);
    box-shadow: 0 2px 16px rgba(240,125,58,0.3);
}
.buscador-icono {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    pointer-events: none;
}

/* ===== GRID VENDEDORES ===== */
.vendedores-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.vendedor-card {
    background: white;
    border-radius: 20px;
    border: 2px solid var(--lupino-pale);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(90,61,138,0.06);
    animation: slideUp 0.4s ease both;
}
.vendedor-card:active {
    transform: scale(0.97);
    box-shadow: 0 1px 6px rgba(90,61,138,0.1);
}
.vendedor-card:hover {
    border-color: var(--lupino-mid);
    box-shadow: 0 4px 20px rgba(90,61,138,0.15);
    transform: translateY(-1px);
}
.vendedor-card.prueba {
    border-style: dashed;
    border-color: #d0c8dc;
    background: #fdfcff;
}
.vendedor-card.prueba:hover {
    border-color: var(--lupino-light);
    border-style: solid;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}

.vendedor-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    font-weight: 900;
    overflow: hidden;
}
.vendedor-avatar img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
}
.vendedor-avatar.ne { background: linear-gradient(135deg, var(--lupino), var(--lupino-light)); color: white; }
.vendedor-avatar.xx { background: var(--lupino-pale); color: var(--lupino-mid); font-size: 1.2rem; }

.vendedor-info { flex: 1; min-width: 0; }
.vendedor-nombre {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--texto);
    line-height: 1.2;
}
.vendedor-detalle {
    font-size: 0.75rem;
    color: var(--gris);
    margin-top: 2px;
}
.vendedor-codigo {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--lupino-mid);
    background: var(--lupino-pale);
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    display: inline-block;
}
.vendedor-card.prueba .vendedor-codigo {
    color: var(--gris);
    background: #f0ecf7;
}

.vendedor-flecha {
    color: var(--lupino-light);
    font-size: 1.2rem;
    flex-shrink: 0;
    transition: transform 0.2s;
}
.vendedor-card:hover .vendedor-flecha {
    transform: translateX(3px);
    color: var(--lupino-mid);
}

/* ===== OCULTOS ===== */
.vendedor-card.oculto { display: none; }

/* ===== FOOTER ===== */
.footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 0 20px 24px;
    color: var(--gris);
    font-size: 0.7rem;
    opacity: 0.6;
}
</style>
</head>
<body>

<div class="bg-deco"></div>

<div class="header">
    <div class="header-logo-wrap">
        <img src="logo-nali.jpg" alt="L" onerror="this.style.display='none';this.parentElement.textContent='🌿'">
    </div>
    <div class="header-titulo">Lupino</div>
    <div class="header-sub">Punto de Venta</div>
</div>

<div class="contenido">

    <div class="seccion-label">¿Quién sos?</div>

    <div class="buscador-wrap">
        <span class="buscador-icono">🔍</span>
        <input type="text" class="buscador-input" id="buscador"
               placeholder="Buscar vendedor..."
               autocomplete="off" oninput="filtrarVendedores()">
    </div>

    <div class="vendedores-grid" id="listaVendedores">

        <a href="ne-index.html" class="vendedor-card" data-nombre="nali eggui nali">
            <div class="vendedor-avatar ne">
                <img src="logo-nali.jpg" alt="NE" onerror="this.style.display='none';this.parentElement.textContent='NE'">
            </div>
            <div class="vendedor-info">
                <div class="vendedor-nombre">Nali Eggui</div>
                <div class="vendedor-detalle">Artesanía & Diseño</div>
                <div class="vendedor-codigo">NE</div>
            </div>
            <div class="vendedor-flecha">›</div>
        </a>

        <a href="xx-index.html" class="vendedor-card prueba" data-nombre="prueba test xx usuario">
            <div class="vendedor-avatar xx">🔧</div>
            <div class="vendedor-info">
                <div class="vendedor-nombre">Usuario Prueba</div>
                <div class="vendedor-detalle">Solo para testing</div>
                <div class="vendedor-codigo">XX</div>
            </div>
            <div class="vendedor-flecha">›</div>
        </a>

    </div>

</div>

<div class="footer">Lupino · Sistema de ventas</div>

<script>
function filtrarVendedores() {
    const q = document.getElementById('buscador').value.toLowerCase().trim();
    const cards = document.querySelectorAll('.vendedor-card');
    cards.forEach(card => {
        const nombre = card.getAttribute('data-nombre') || '';
        card.classList.toggle('oculto', q.length > 0 && !nombre.includes(q));
    });
}
</script>

</body>
</html>
