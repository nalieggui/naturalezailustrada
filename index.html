<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nali Eggui · Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* ===== VARIABLES ===== */
:root {
    --lavanda:      #9b7ec8;
    --lavanda-dark: #7c5fa8;
    --lavanda-light:#e8dff5;
    --naranja:      #f07d3a;
    --naranja-dark: #d4622a;
    --arena:        #f5e6c8;
    --arena-dark:   #e8d4a8;
    --blanco:       #fdf9f4;
    --gris:         #6b6572;
    --texto:        #3d3244;
    --rojo:         #d64242;
    --verde:        #5a9e6f;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--blanco);
    color: var(--texto);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ===== HEADER ===== */
.header {
    background: linear-gradient(135deg, var(--lavanda-dark) 0%, var(--lavanda) 60%, #b89fd4 100%);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(124,95,168,0.3);
}
.header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
}
.header-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
}
.header-titulo {
    font-family: 'Playfair Display', serif;
    color: white;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.5px;
    line-height: 1.1;
}
.header-sub {
    color: rgba(255,255,255,0.7);
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
}
.header-right {
    display: flex;
    align-items: center;
    gap: 8px;
}
.indicador-carga {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #ff5252;
    flex-shrink: 0;
    transition: background 0.5s;
}
.indicador-carga.ok {
    background: #69f0ae;
    box-shadow: 0 0 0 0 rgba(105,240,174,0.6);
    animation: pulsoVerde 2s infinite;
}
.indicador-carga.cargando {
    background: #ffb300;
    animation: parpadeo 0.8s infinite;
}
@keyframes pulsoVerde {
    0% { box-shadow: 0 0 0 0 rgba(105,240,174,0.6); }
    70% { box-shadow: 0 0 0 5px rgba(105,240,174,0); }
    100% { box-shadow: 0 0 0 0 rgba(105,240,174,0); }
}
@keyframes parpadeo { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* ===== BARRA HERRAMIENTAS ===== */
.toolbar {
    background: var(--lavanda-dark);
    padding: 8px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
}
.btn-tool {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: white;
    letter-spacing: 0.3px;
}
.btn-tool.ingreso  { background: rgba(240,125,58,0.7); }
.btn-tool.ajuste   { background: rgba(255,255,255,0.15); }
.btn-tool.hoy      { background: rgba(90,158,111,0.7); }
.btn-tool.cerrar   { background: rgba(214,66,66,0.6); }
        .btn-tool.stats    { background: rgba(90,158,111,0.85); }

/* ===== BUSCADOR ===== */
.buscador-wrap {
    background: white;
    padding: 10px 14px;
    border-bottom: 1px solid #ede8f5;
    flex-shrink: 0;
}
.buscador-input {
    width: 100%;
    padding: 10px 16px;
    border: 2px solid var(--lavanda-light);
    border-radius: 50px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--texto);
    outline: none;
    transition: border-color 0.2s;
    background: var(--blanco);
}
.buscador-input:focus { border-color: var(--lavanda); }
.buscador-resultados {
    position: absolute;
    left: 0; right: 0;
    background: white;
    z-index: 500;
    border-bottom: 2px solid var(--lavanda-light);
    max-height: 55vh;
    overflow-y: auto;
}
.resultado-item {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #f5f0ff;
    cursor: pointer;
    transition: background 0.1s;
}
.resultado-item:active { background: var(--lavanda-light); }
.resultado-img {
    width: 38px; height: 38px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--arena);
    flex-shrink: 0;
}
.resultado-nombre {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--texto);
    flex: 1;
}
.resultado-precio {
    font-weight: 700;
    color: var(--lavanda-dark);
    font-size: 0.9rem;
}

/* ===== VENTA ACTUAL ===== */
.venta-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    position: relative;
}
.venta-header {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--arena);
    border-bottom: 1px solid var(--arena-dark);
    position: sticky;
    top: 0;
    z-index: 10;
}
.venta-titulo {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gris);
    text-transform: uppercase;
    letter-spacing: 1.5px;
}
.btn-limpiar {
    background: none;
    border: 1px solid var(--rojo);
    color: var(--rojo);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
}

.item-venta {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #f5f0ff;
    gap: 8px;
}
.item-nombre {
    flex: 1;
    font-weight: 600;
    font-size: 0.88rem;
    color: var(--texto);
    min-width: 0;
}
.item-qty-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}
.btn-qty {
    width: 28px; height: 28px;
    border: none;
    border-radius: 50%;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: var(--lavanda-light);
    color: var(--lavanda-dark);
}
.item-qty { font-weight: 900; font-size: 1rem; min-width: 18px; text-align: center; }
.item-precio {
    font-weight: 700;
    color: var(--lavanda-dark);
    font-size: 0.9rem;
    text-decoration: underline dotted;
    cursor: pointer;
    min-width: 70px;
    text-align: right;
    flex-shrink: 0;
}
.item-precio.modificado { color: var(--naranja); }
.item-subtotal {
    font-weight: 900;
    color: var(--texto);
    font-size: 0.95rem;
    min-width: 75px;
    text-align: right;
    flex-shrink: 0;
}

/* ===== TOTAL / COBRAR ===== */
.total-bar {
    background: linear-gradient(135deg, var(--lavanda-dark), var(--lavanda));
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 -2px 12px rgba(124,95,168,0.2);
}
.total-label { color: rgba(255,255,255,0.8); font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.total-monto { color: white; font-size: 1.8rem; font-weight: 900; font-family: 'Playfair Display', serif; }
.btn-cobrar {
    background: linear-gradient(135deg, var(--naranja), var(--naranja-dark));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 4px 12px rgba(240,125,58,0.4);
    letter-spacing: 0.5px;
}

/* ===== TOAST ===== */
.toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.88rem;
    font-weight: 600;
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    pointer-events: none;
}
.toast.visible { opacity: 1; }
.toast.verde { background: var(--verde); }
.toast.rojo  { background: var(--rojo); }
.toast.naranja { background: var(--naranja); }

/* ===== MODAL BASE ===== */
.modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(61,50,68,0.75);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
}
.modal-bg.open {
    opacity: 1;
    pointer-events: all;
}
.modal-sheet {
    background: white;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 92vh;
    padding-bottom: env(safe-area-inset-bottom);
}
.modal-handle {
    width: 36px; height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 12px auto 4px;
}
.modal-header {
    padding: 8px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #f0ebf8;
}
.modal-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--lavanda-dark);
}
.modal-cerrar {
    background: var(--lavanda-light);
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 1rem;
    cursor: pointer;
    color: var(--lavanda-dark);
}

/* ===== CONFIRM ===== */
.confirm-items {
    padding: 12px 20px;
    max-height: 35vh;
    overflow-y: auto;
}
.confirm-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.88rem;
    border-bottom: 1px solid #f5f0ff;
    color: var(--texto);
}
.confirm-total {
    padding: 12px 20px;
    text-align: center;
    font-size: 2rem;
    font-weight: 900;
    font-family: 'Playfair Display', serif;
    color: var(--lavanda-dark);
}
.metodos-pago {
    display: flex;
    gap: 8px;
    padding: 0 20px 14px;
    flex-wrap: wrap;
}
.btn-metodo {
    flex: 1;
    min-width: calc(50% - 4px);
    padding: 10px 8px;
    border: 2px solid #e8dff5;
    border-radius: 14px;
    background: white;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--gris);
    transition: all 0.15s;
}
.btn-metodo.activo {
    border-color: var(--lavanda);
    background: var(--lavanda-light);
    color: var(--lavanda-dark);
}
.confirm-acciones {
    display: flex;
    gap: 10px;
    padding: 0 20px 16px;
}
.btn-cancelar-confirm {
    flex: 1;
    padding: 13px;
    border: 2px solid #e8dff5;
    border-radius: 50px;
    background: white;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--gris);
}
.btn-ok-confirm {
    flex: 2;
    padding: 13px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--naranja), var(--naranja-dark));
    color: white;
    font-size: 0.95rem;
    font-weight: 900;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 4px 12px rgba(240,125,58,0.4);
}
.btn-ok-confirm:disabled { opacity: 0.6; }

/* ===== FORM ===== */
.form-scroll { padding: 16px 20px 0; overflow-y: auto; max-height: 75vh; }
.form-grupo { margin-bottom: 14px; }
.form-label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--gris); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e8dff5;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--texto);
    outline: none;
    background: var(--blanco);
    transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--lavanda); }
.btn-guardar {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--lavanda), var(--lavanda-dark));
    color: white;
    font-size: 0.95rem;
    font-weight: 900;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 16px;
}

/* ===== RESUMEN DÍA ===== */
.resumen-card {
    margin: 12px 14px;
    background: linear-gradient(135deg, var(--lavanda-light), var(--arena));
    border-radius: 16px;
    padding: 16px;
}
.resumen-total {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--lavanda-dark);
}
.resumen-label { font-size: 0.75rem; color: var(--gris); font-weight: 500; }
.resumen-stat {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(155,126,200,0.2);
}
.venta-detalle {
    margin: 8px 14px;
    background: white;
    border-radius: 14px;
    padding: 12px 14px;
    border: 1px solid #ede8f5;
}
.venta-hora { font-size: 0.78rem; color: var(--gris); margin-bottom: 4px; }
.venta-items-text { font-size: 0.82rem; color: var(--texto); line-height: 1.5; }
.venta-monto { font-weight: 900; color: var(--lavanda-dark); float: right; }

/* ===== BADGE STOCK ===== */
.badge-stock {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
}

/* ===== QR PANEL ===== */
.qr-panel {
    margin: 0 20px 14px;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-logo">
        <div class="header-icon">🌿</div>
        <div>
            <div class="header-titulo">Nali Eggui</div>
            <div class="header-sub">Artesanía & Diseño</div>
        </div>
    </div>
    <div class="header-right">
        <div class="indicador-carga" id="indicadorCarga" title="Cargando..."></div>
        <span style="color:rgba(255,255,255,0.8);font-size:0.75rem;font-weight:600;">Nali</span>
    </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
    <button class="btn-tool ingreso" onclick="abrirIngreso()">📦 Ingresar</button>
    <button class="btn-tool ajuste" onclick="abrirAjuste()">✏️ Ajustar</button>
    <button class="btn-tool hoy" onclick="abrirResumen()">📋 Hoy</button>
    <button class="btn-tool stats" onclick="abrirEstadisticas()">📊 Stats</button>
    <button class="btn-tool cerrar" onclick="cerrarDia()">🔒 Cerrar</button>
</div>

<!-- BUSCADOR -->
<div class="buscador-wrap" style="position:relative;">
    <input type="text" class="buscador-input" id="buscadorInput"
           placeholder="🔍 Buscar producto..."
           autocomplete="off" autocorrect="off" autocapitalize="off"
           oninput="buscarProducto()"
           style="text-transform:uppercase;">
    <div id="buscadorResultados" class="buscador-resultados" style="display:none;position:absolute;top:100%;"></div>
</div>

<!-- VENTA ACTUAL -->
<div class="venta-wrap">
    <div class="venta-header">
        <span class="venta-titulo">🛒 Venta actual</span>
        <button class="btn-limpiar" onclick="limpiarVenta()">🗑 Limpiar</button>
    </div>
    <div id="listaVenta"></div>
</div>

<!-- TOTAL BAR -->
<div class="total-bar">
    <div>
        <div class="total-label">Total</div>
        <div class="total-monto" id="totalMonto">$0</div>
    </div>
    <button class="btn-cobrar" onclick="abrirConfirm()">Cobrar →</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===== MODAL CONFIRMAR ===== -->
<div class="modal-bg" id="modalConfirm" onclick="if(event.target===this)cerrarConfirm()">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span class="modal-titulo">✨ Confirmar venta</span>
            <button class="modal-cerrar" onclick="cerrarConfirm()">✕</button>
        </div>
        <div class="confirm-items" id="confirmItems"></div>
        <div class="confirm-total" id="confirmTotal">$0</div>

        <!-- MÉTODOS DE PAGO -->
        <div class="metodos-pago">
            <button class="btn-metodo activo" id="metodo-efectivo" onclick="seleccionarMetodo('efectivo')">💵 Efectivo</button>
            <button class="btn-metodo" id="metodo-qr" onclick="seleccionarMetodo('qr')">📱 QR MP</button>
            <button class="btn-metodo" id="metodo-transferencia" onclick="seleccionarMetodo('transferencia')">🏦 Transferencia</button>
            <button class="btn-metodo" id="metodo-debito" onclick="seleccionarMetodo('debito')">💳 Débito</button>
        </div>

        <!-- PANEL QR -->
        <div id="panelQR" style="display:none;">
            <div id="panelQRMP" style="display:none;" class="qr-panel" style="background:#e3f2fd;">
                <div style="background:#009ee3;border-radius:12px;padding:12px;">
                    <div style="color:white;font-weight:900;font-size:0.85rem;margin-bottom:8px;">📱 QR Mercado Pago</div>
                    <div style="background:white;border-radius:8px;padding:8px;display:inline-block;" id="qrMP"></div>
                    <div id="qrMontoMP" style="color:white;font-size:1.5rem;font-weight:900;margin-top:8px;"></div>
                    <button onclick="abrirPointTap()"
                            style="width:100%;margin-top:8px;padding:10px;border:none;border-radius:10px;
                                   background:white;color:#009ee3;font-weight:900;cursor:pointer;font-size:0.9rem;">
                        📲 Abrir Point Tap
                    </button>
                </div>
            </div>
            <div id="panelQRTransf" style="display:none;" class="qr-panel">
                <div style="background:#f0f7ff;border-radius:12px;padding:12px;border:2px solid #bbdefb;">
                    <div style="font-weight:700;color:#1976d2;font-size:0.82rem;margin-bottom:8px;">🏦 Transferencia</div>
                    <div id="qrTransfCanvas" style="display:inline-block;background:white;padding:8px;border-radius:8px;"></div>
                    <div id="qrTransfMonto" style="font-size:1.3rem;font-weight:900;color:var(--lavanda-dark);margin-top:8px;"></div>
                    <div style="background:#e8f5e9;border-radius:8px;padding:8px;margin-top:8px;">
                        <div style="font-size:0.7rem;color:#555;text-transform:uppercase;letter-spacing:1px;">Alias</div>
                        <div style="font-size:1.2rem;font-weight:900;color:#1b5e20;">pago.copihue</div>
                    </div>
                    <div style="font-size:0.72rem;color:#e65100;margin-top:6px;">
                        📲 Ir a Transferencia → ícono 📷 cámara
                    </div>
                </div>
            </div>
        </div>

        <div class="confirm-acciones">
            <button class="btn-cancelar-confirm" onclick="cerrarConfirm()">Cancelar</button>
            <button class="btn-ok-confirm" id="btnOkConfirm" onclick="confirmarVenta()">✅ Confirmar</button>
        </div>

        <!-- TICKET WA (post-venta) -->
        <div id="btnTicketWA" style="display:none;padding:0 20px 16px;">
            <button onclick="enviarTicketWA()"
                    style="width:100%;padding:12px;border:none;border-radius:50px;
                           background:linear-gradient(135deg,#25D366,#128C7E);
                           color:white;font-size:0.95rem;font-weight:900;cursor:pointer;">
                📲 Enviar ticket al cliente
            </button>
        </div>
    </div>
</div>

<!-- ===== MODAL INGRESAR MERCADERÍA ===== -->
<div class="modal-bg" id="modalIngreso" onclick="if(event.target===this)cerrarIngreso()">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span class="modal-titulo">📦 Ingresar mercadería</span>
            <button class="modal-cerrar" onclick="cerrarIngreso()">✕</button>
        </div>
        <div class="form-scroll">
            <div class="form-grupo">
                <label class="form-label">Producto *</label>
                <input type="text" class="form-input" id="ingProducto"
                       placeholder="Buscar o escribir..."
                       autocomplete="off" oninput="buscarProductoIngreso()"
                       style="text-transform:uppercase;">
                <div id="ingResultados" style="background:white;border:1px solid #e8dff5;border-radius:10px;margin-top:4px;max-height:140px;overflow-y:auto;display:none;"></div>
                <div id="ingInfo" style="background:var(--arena);border-left:3px solid var(--naranja);padding:8px 10px;border-radius:8px;font-size:0.85rem;margin-top:6px;display:none;"></div>
            </div>
            <div class="form-grupo">
                <label class="form-label">Categoría</label>
                <input type="text" class="form-input" id="ingCategoria" placeholder="PAPELERIA, TEXTIL, ACCESORIOS..." style="text-transform:uppercase;">
            </div>
            <div class="form-grupo">
                <label class="form-label">Cantidad *</label>
                <input type="number" class="form-input" id="ingCantidad" placeholder="1" min="1" value="1">
            </div>
            <div class="form-grupo">
                <label class="form-label">Precio de COSTO</label>
                <input type="number" class="form-input" id="ingCosto" placeholder="Opcional" min="0" oninput="calcularSugeridoIngreso()">
                <div id="ingSugerido" style="background:var(--arena);border-left:3px solid var(--naranja);padding:8px 10px;border-radius:8px;font-size:0.85rem;margin-top:6px;display:none;">
                    💡 Sugerido (+50%): <strong id="ingSugeridoMonto">$0</strong>
                </div>
            </div>
            <div class="form-grupo">
                <label class="form-label">Precio de VENTA</label>
                <input type="number" class="form-input" id="ingVenta" placeholder="Dejar vacío para mantener actual" min="0">
            </div>
            <div class="form-grupo">
                <label class="form-label">Proveedor</label>
                <input type="text" class="form-input" id="ingProveedor" placeholder="Opcional" style="text-transform:uppercase;">
            </div>
            <div id="ingError" style="color:var(--rojo);font-size:0.85rem;margin-bottom:10px;display:none;"></div>
            <button class="btn-guardar" id="ingBtnGuardar" onclick="guardarIngreso()">📦 Guardar ingreso</button>
        </div>
    </div>
</div>

<!-- ===== MODAL AJUSTE RÁPIDO ===== -->
<div class="modal-bg" id="modalAjuste" onclick="if(event.target===this)cerrarAjuste()">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span class="modal-titulo">✏️ Ajuste rápido</span>
            <button class="modal-cerrar" onclick="cerrarAjuste()">✕</button>
        </div>
        <div class="form-scroll">
            <div class="form-grupo">

                       placeholder="Buscar producto..."

                       style="text-transform:uppercase;">

            </div>
            <div id="ajustePanel" style="display:none;">
                <div id="ajusteNombre" style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--lavanda-dark);margin-bottom:4px;"></div>
                <div id="ajusteStockActual" style="font-size:0.82rem;color:var(--gris);margin-bottom:14px;"></div>
                <div class="form-grupo">
                    <label class="form-label">Código (NE###)</label>
                    <input type="text" class="form-input" id="ajusteCodigoNuevo" style="text-transform:uppercase;" placeholder="NE001">
                </div>
                <div class="form-grupo">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-input" id="ajusteNombreNuevo" style="text-transform:uppercase;">
                </div>
                <div class="form-grupo">
                    <label class="form-label">Stock</label>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <button onclick="cambiarAjuste(-1)" style="width:40px;height:40px;border:none;border-radius:50%;background:var(--lavanda-light);color:var(--lavanda-dark);font-size:1.3rem;font-weight:900;cursor:pointer;">−</button>
                        <span id="ajusteNuevo" style="font-size:1.5rem;font-weight:900;color:var(--texto);min-width:40px;text-align:center;">0</span>
                        <button onclick="cambiarAjuste(1)" style="width:40px;height:40px;border:none;border-radius:50%;background:var(--lavanda-light);color:var(--lavanda-dark);font-size:1.3rem;font-weight:900;cursor:pointer;">+</button>
                    </div>

                <div class="form-grupo">
                    <label class="form-label">Precio de venta</label>
                    <input type="number" class="form-input" id="ajustePrecioNuevo" min="0">

                <div id="ajusteError" style="color:var(--rojo);font-size:0.85rem;margin-bottom:8px;display:none;"></div>

</div>

<!-- ===== MODAL RESUMEN DÍA ===== -->
<div class="modal-bg" id="modalResumen" onclick="if(event.target===this)cerrarResumen()">
    <div class="modal-sheet" style="padding-bottom:20px;">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span class="modal-titulo">📊 Resumen del día</span>
            <button class="modal-cerrar" onclick="cerrarResumen()">✕</button>
        </div>
        <div style="overflow-y:auto;max-height:75vh;padding-bottom:10px;" id="resumenContenido"></div>
    </div>
</div>

<script>
// ========== CONFIG ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbwQBFhcB-fqSdZ_1fExU8fQ8kzXJwYn5KTHJgZrrIYDXNq_MiKkprzcU0imGzU_Xnen7w/exec';
const HOY_KEY = 'nalieggui_ventas_' + new Date().toISOString().slice(0, 10);
const CARRITO_KEY = 'nalieggui_carrito';

// ========== ESTADO ==========
let productos = [];
let ventaActual = JSON.parse(localStorage.getItem(CARRITO_KEY) || '[]');
let metodoPagoActual = 'efectivo';
let productoIngresoSel = null;
let ajusteProducto = null;
let ajusteValor = 0;

// ========== SEMÁFORO STOCK ==========
function colorStock(stock) {
    if (stock === 0) return { bg: '#ffebee', text: '#c62828' };
    if (stock === 1) return { bg: '#fff3e0', text: '#e65100' };
    if (stock === 2) return { bg: '#fff8e1', text: '#f57c00' };
    if (stock === 3) return { bg: '#f1f8e9', text: '#558b2f' };
    return { bg: '#e8f5e9', text: '#1b5e20' };
}
function badgeStock(stock) {
    const c = colorStock(stock);
    const ic = stock===0?'❌':stock===1?'🟠':stock===2?'🟡':stock===3?'🟢':'✅';
    return '<span style="background:'+c.bg+';color:'+c.text+';font-weight:700;font-size:0.72rem;padding:2px 8px;border-radius:20px;">'+ic+' Stock: '+stock+'</span>';
}

// ========== TOAST ==========
function mostrarToast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (tipo || '') + ' visible';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => t.className = 'toast', 2500);
}

// ========== CARGAR PRODUCTOS ==========
async function cargarProductos() {
    const ind = document.getElementById('indicadorCarga');
    ind.classList.remove('ok'); ind.classList.add('cargando'); ind.title = 'Cargando...';
    try {
        const r = await fetch(API_URL + '?action=getProductos', { redirect: 'follow' });
        const data = await r.json();
        const arr = data.productos || [];
        productos = arr.filter(p => p.name && p.price > 0);
        ind.classList.remove('cargando'); ind.classList.add('ok');
        ind.title = productos.length + ' productos';
        renderVenta();
    } catch(e) {
        ind.classList.remove('cargando');
        ind.title = 'Error de conexión';
        mostrarToast('❌ Error al cargar productos', 'rojo');
    }
}

// ========== BUSCAR PRODUCTO ==========
function buscarProducto() {
    const q = document.getElementById('buscadorInput').value.toUpperCase().trim();
    const div = document.getElementById('buscadorResultados');
    if (q.length < 2) { div.style.display = 'none'; return; }
    const matches = productos.filter(p => p.name.includes(q)).slice(0, 10);
    if (!matches.length) { div.style.display = 'none'; return; }
    const c = colorStock;
    div.innerHTML = matches.map(p => {
        const col = c(p.stock);
        return '<div class="resultado-item" onclick="agregarProducto('+p.id+')" style="background:'+col.bg+';">' +
            '<div class="resultado-nombre" style="color:'+(p.stock===0?col.text:'var(--texto)')+';">' + (p.stock===0?'❌ ':'') + p.name + '</div>' +
            '<div style="text-align:right;">' +
                '<div class="resultado-precio">$' + p.price.toLocaleString('es-AR') + '</div>' +
                '<div style="font-size:0.7rem;color:'+col.text+';">Stock: '+p.stock+'</div>' +
            '</div></div>';
    }).join('');
    div.style.display = 'block';
}

function agregarProducto(id) {
    const p = productos.find(pr => pr.id === id);
    if (!p) return;
    document.getElementById('buscadorInput').value = '';
    document.getElementById('buscadorResultados').style.display = 'none';
    const existente = ventaActual.find(i => i.id === id);
    if (existente) {
        if (existente.qty >= p.stock && p.stock > 0) { mostrarToast('⚠️ Stock máximo: ' + p.stock, 'rojo'); return; }
        existente.qty++;
    } else {
        ventaActual.push({ id: p.id, name: p.name, price: p.price, qty: 1, stockDisponible: p.stock });
    }
    guardarCarrito();
    renderVenta();
    mostrarToast('✅ ' + p.name.substring(0, 28), 'verde');
}

// ========== RENDER VENTA ==========
function renderVenta() {
    const lista = document.getElementById('listaVenta');
    const total = ventaActual.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById('totalMonto').textContent = '$' + total.toLocaleString('es-AR');
    if (!ventaActual.length) {
        lista.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#bbb;"><div style="font-size:2rem;margin-bottom:8px;">🌿</div><div style="font-size:0.9rem;">Buscá un producto para empezar</div></div>';
        return;
    }
    lista.innerHTML = ventaActual.map(item => {
        const modClass = item.precioModificado ? ' modificado' : '';
        return '<div class="item-venta">' +
            '<div class="item-nombre">' + item.name + '</div>' +
            '<div class="item-qty-wrap">' +
                '<button class="btn-qty" onclick="cambiarQty('+item.id+',-1)">−</button>' +
                '<span class="item-qty">'+item.qty+'</span>' +
                '<button class="btn-qty" onclick="cambiarQty('+item.id+',1)">+</button>' +
            '</div>' +
            '<div class="item-precio'+modClass+'" onclick="editarPrecio('+item.id+')">$'+item.price.toLocaleString('es-AR')+'</div>' +
            '<div class="item-subtotal">$'+(item.price*item.qty).toLocaleString('es-AR')+'</div>' +
        '</div>';
    }).join('');
}

function cambiarQty(id, delta) {
    const item = ventaActual.find(i => i.id === id);
    if (!item) return;
    item.qty = Math.max(1, item.qty + delta);
    const p = productos.find(pr => pr.id === id);
    if (p && item.qty > p.stock && p.stock > 0) { item.qty = p.stock; mostrarToast('⚠️ Stock máximo: ' + p.stock, 'rojo'); }
    guardarCarrito(); renderVenta();
}

function editarPrecio(id) {
    const item = ventaActual.find(i => i.id === id);
    if (!item) return;
    const nuevo = prompt('Nuevo precio para ' + item.name.substring(0,25) + ':', item.price);
    if (nuevo === null) return;
    const precioNuevo = parseInt(nuevo);
    if (isNaN(precioNuevo) || precioNuevo < 0) { mostrarToast('⚠️ Precio inválido', 'rojo'); return; }
    item.precioOriginal = item.precioModificado ? item.precioOriginal : item.price;
    item.price = precioNuevo;
    item.precioModificado = precioNuevo !== item.precioOriginal;
    guardarCarrito(); renderVenta();
    mostrarToast(precioNuevo === 0 ? '🎁 Regalo' : '💸 Precio actualizado', 'verde');
}

function limpiarVenta() {
    if (ventaActual.length && !confirm('¿Limpiar la venta actual?')) return;
    ventaActual = [];
    guardarCarrito(); renderVenta();
}

function guardarCarrito() {
    localStorage.setItem(CARRITO_KEY, JSON.stringify(ventaActual));
}

// ========== CONFIRMAR VENTA ==========
function abrirConfirm() {
    if (!ventaActual.length) { mostrarToast('Agregá productos primero', 'rojo'); return; }
    const total = ventaActual.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById('confirmItems').innerHTML = ventaActual.map(i =>
        '<div class="confirm-item"><span>'+i.qty+'× '+i.name.substring(0,30)+'</span><strong>$'+(i.price*i.qty).toLocaleString('es-AR')+'</strong></div>'
    ).join('');
    document.getElementById('confirmTotal').textContent = '$' + total.toLocaleString('es-AR');
    seleccionarMetodo('efectivo');
    document.getElementById('modalConfirm').classList.add('open');
}

function cerrarConfirm() {
    document.getElementById('modalConfirm').classList.remove('open');
    const btnTicket = document.getElementById('btnTicketWA');
    if (btnTicket) btnTicket.style.display = 'none';
    const btnOk = document.getElementById('btnOkConfirm');
    if (btnOk) { btnOk.textContent = '✅ Confirmar'; btnOk.disabled = false; }
    document.getElementById('panelQR').style.display = 'none';
    document.getElementById('panelQRMP').style.display = 'none';
    document.getElementById('panelQRTransf').style.display = 'none';
}

function seleccionarMetodo(metodo) {
    metodoPagoActual = metodo;
    ['efectivo','qr','transferencia','debito'].forEach(m => {
        const btn = document.getElementById('metodo-' + m);
        if (btn) btn.className = 'btn-metodo' + (m === metodo ? ' activo' : '');
    });
    const panelQR = document.getElementById('panelQR');
    const panelMP = document.getElementById('panelQRMP');
    const panelTransf = document.getElementById('panelQRTransf');
    const total = ventaActual.reduce((s, i) => s + i.price * i.qty, 0);
    if (metodo === 'qr') {
        panelQR.style.display = 'block';
        panelMP.style.display = 'block';
        panelTransf.style.display = 'none';
        document.getElementById('qrMontoMP').textContent = '$' + total.toLocaleString('es-AR');
        const qrMP = document.getElementById('qrMP');
        if (qrMP && qrMP.children.length === 0) {
            new QRCode(qrMP, { text: 'https://link.mercadopago.com.ar/almacencopihue', width:180, height:180, colorDark:'#009ee3', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
        }
    } else if (metodo === 'transferencia') {
        panelQR.style.display = 'block';
        panelMP.style.display = 'none';
        panelTransf.style.display = 'block';
        document.getElementById('qrTransfMonto').textContent = '$' + total.toLocaleString('es-AR');
        const qrCanv = document.getElementById('qrTransfCanvas');
        if (qrCanv && qrCanv.children.length === 0) {
            new QRCode(qrCanv, { text: 'pago.copihue', width:160, height:160, colorDark:'#7c5fa8', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
        }
    } else {
        panelQR.style.display = 'none';
        panelMP.style.display = 'none';
        panelTransf.style.display = 'none';
    }
}

function abrirPointTap() {
    window.location.href = 'mercadopago://point_tap';
    setTimeout(() => window.open('https://www.mercadopago.com.ar/point-tap', '_blank'), 1500);
}

async function confirmarVenta() {
    const btn = document.getElementById('btnOkConfirm');
    btn.disabled = true;
    btn.textContent = '⏳ Procesando...';
    const total = ventaActual.reduce((s, i) => s + i.price * i.qty, 0);
    const hora = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    let stockOk = false;
    try {
        const ventaData = ventaActual.map(i => ({
            id: i.id, name: i.name, qty: i.qty,
            precioVenta: i.price,
            precioModificado: i.precioModificado || false,
            precioOriginal: i.precioOriginal || 0
        }));
        const payload = { items: ventaData, metodoPago: metodoPagoActual };
        const url = API_URL + '?action=vender&data=' + encodeURIComponent(JSON.stringify(payload));
        const r = await fetch(url, { redirect: 'follow' });
        const resp = await r.json();
        stockOk = resp.success === true;
    } catch(e) { console.warn('Sin conexión:', e); }

    window._ultimaVenta = { items: [...ventaActual], total, hora, metodo: metodoPagoActual };
    guardarVentaDia({ items: [...ventaActual], total, hora, metodoPago: metodoPagoActual });
    ventaActual.forEach(item => {
        const p = productos.find(pr => pr.id === item.id);
        if (p) p.stock = Math.max(0, p.stock - item.qty);
    });
    ventaActual = [];
    localStorage.removeItem(CARRITO_KEY);
    renderVenta();
    document.getElementById('btnTicketWA').style.display = 'block';
    btn.textContent = '✅ Confirmado';
    mostrarToast(stockOk ? '✅ Venta registrada' : '✅ Venta guardada (sin conexión)', 'verde');
}

function enviarTicketWA() {
    var v = window._ultimaVenta;
    if (!v) return;
    var fecha = new Date().toLocaleDateString('es-AR', { weekday:'short', day:'2-digit', month:'2-digit' });
    var metodoLabel = { efectivo:'Efectivo', qr:'QR MP', transferencia:'Transferencia', debito:'Débito' }[v.metodo] || v.metodo;
    var lineas = v.items.map(function(i) {
        var nombre = i.name.length > 28 ? i.name.substring(0,28)+'...' : i.name;
        return i.qty+'x '+nombre+' $'+(i.price*i.qty).toLocaleString('es-AR');
    }).join('\n');
    var mensaje = '🌿 *Nali Eggui*\n📅 '+fecha+' - '+v.hora+'\n\n'+lineas+'\n'+'--------------------------------\n'+'*Total: $'+v.total.toLocaleString('es-AR')+'* - '+metodoLabel+'\n\n¡Gracias por tu compra! 🙏';
    window.open('https://wa.me/?text='+encodeURIComponent(mensaje), '_blank');
}

// ========== HISTORIAL DÍA ==========
function guardarVentaDia(venta) {
    const ventas = JSON.parse(localStorage.getItem(HOY_KEY) || '[]');
    ventas.push(venta);
    localStorage.setItem(HOY_KEY, JSON.stringify(ventas));
}

// ========== RESUMEN DÍA ==========
function abrirResumen() {
    const ventas = JSON.parse(localStorage.getItem(HOY_KEY) || '[]');
    const total = ventas.reduce((s, v) => s + v.total, 0);
    const ticket = ventas.length ? Math.round(total / ventas.length) : 0;
    const div = document.getElementById('resumenContenido');
    if (!ventas.length) {
        div.innerHTML = '<div style="text-align:center;padding:40px;color:#bbb;">Sin ventas hoy aún</div>';
    } else {
        div.innerHTML = '<div class="resumen-card">' +
            '<div class="resumen-label">💰 Total del día</div>' +
            '<div class="resumen-total">$' + total.toLocaleString('es-AR') + '</div>' +
            '<div class="resumen-stat">' +
                '<span class="resumen-label">🛒 Ventas: <strong>' + ventas.length + '</strong></span>' +
                '<span class="resumen-label">🎯 Ticket prom: <strong>$' + ticket.toLocaleString('es-AR') + '</strong></span>' +
            '</div></div>' +
            '<div style="padding:0 14px 8px;font-size:0.72rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;">Detalle de ventas</div>' +
            ventas.map(v => '<div class="venta-detalle">' +
                '<div class="venta-hora">🕐 ' + v.hora + '<span class="venta-monto">$' + v.total.toLocaleString('es-AR') + '</span></div>' +
                '<div class="venta-items-text">' + v.items.map(i => i.qty+'× '+i.name).join(' · ') + '</div>' +
            '</div>').join('') +
            '<div style="padding:16px 14px;">' +
                '<button onclick="cerrarDia()" style="width:100%;padding:14px;background:#fff0f0;border:2px solid #ffcdd2;border-radius:50px;color:var(--rojo);font-weight:900;cursor:pointer;font-size:0.95rem;font-family:\'DM Sans\',sans-serif;">🔒 Cerrar día y resetear</button>' +
            '</div>';
    }
    document.getElementById('modalResumen').classList.add('open');
}

function cerrarResumen() {
    document.getElementById('modalResumen').classList.remove('open');
}

function cerrarDia() {
    if (!confirm('¿Cerrar el día? Esto limpiará el historial local.')) return;
    localStorage.removeItem(HOY_KEY);
    cerrarResumen();
    mostrarToast('🔒 Día cerrado', 'verde');
}

// ========== INGRESAR MERCADERÍA ==========
function abrirIngreso() {
    productoIngresoSel = null;
    document.getElementById('ingProducto').value = '';
    document.getElementById('ingCantidad').value = '1';
    document.getElementById('ingCosto').value = '';
    document.getElementById('ingVenta').value = '';
    document.getElementById('ingProveedor').value = '';
    document.getElementById('ingCategoria').value = '';
    document.getElementById('ingResultados').style.display = 'none';
    document.getElementById('ingInfo').style.display = 'none';
    document.getElementById('ingSugerido').style.display = 'none';
    document.getElementById('ingError').style.display = 'none';
    document.getElementById('ingBtnGuardar').disabled = false;
    document.getElementById('modalIngreso').classList.add('open');
}
function cerrarIngreso() { document.getElementById('modalIngreso').classList.remove('open'); }

function buscarProductoIngreso() {
    const q = document.getElementById('ingProducto').value.toUpperCase().trim();
    const div = document.getElementById('ingResultados');
    productoIngresoSel = null;
    document.getElementById('ingInfo').style.display = 'none';
    if (q.length < 2) { div.style.display = 'none'; return; }
    const matches = productos.filter(p => p.name.includes(q)).slice(0, 8);
    if (!matches.length) { div.style.display = 'none'; return; }
    div.innerHTML = matches.map(p => {
        const c = colorStock(p.stock);
        return '<div onclick="seleccionarProductoIngreso('+p.id+')" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f5f0ff;display:flex;align-items:center;gap:10px;background:'+c.bg+';">' +
            '<div style="flex:1;"><div style="font-weight:700;font-size:0.85rem;color:'+c.text+';">'+p.name+'</div>' +
            '<div style="font-size:0.75rem;">' + badgeStock(p.stock) + ' · $'+p.price.toLocaleString('es-AR')+'</div></div></div>';
    }).join('');
    div.style.display = 'block';
}

function seleccionarProductoIngreso(id) {
    const p = productos.find(pr => pr.id === id);
    if (!p) return;
    productoIngresoSel = p;
    document.getElementById('ingProducto').value = p.name;
    document.getElementById('ingResultados').style.display = 'none';
    document.getElementById('ingCategoria').value = p.category || '';
    if (!document.getElementById('ingVenta').value) document.getElementById('ingVenta').value = p.price;
    if (p.proveedor) document.getElementById('ingProveedor').value = p.proveedor;
    const info = document.getElementById('ingInfo');
    const c = colorStock(p.stock);
    info.style.display = 'block';
    info.style.background = p.stock === 0 ? '#fff5f5' : 'var(--arena)';
    info.style.borderLeftColor = p.stock === 0 ? '#e53935' : 'var(--naranja)';
    info.innerHTML = badgeStock(p.stock) + ' · Precio actual: <strong>$' + p.price.toLocaleString('es-AR') + '</strong>';
}

function calcularSugeridoIngreso() {
    const costo = parseFloat(document.getElementById('ingCosto').value) || 0;
    const div = document.getElementById('ingSugerido');
    if (costo > 0) {
        document.getElementById('ingSugeridoMonto').textContent = '$' + Math.ceil(costo * 1.5).toLocaleString('es-AR');
        div.style.display = 'block';
    } else { div.style.display = 'none'; }
}

async function guardarIngreso() {
    const nombre = document.getElementById('ingProducto').value.trim().toUpperCase();
    const cantidad = parseInt(document.getElementById('ingCantidad').value) || 0;
    const costo = parseFloat(document.getElementById('ingCosto').value) || null;
    const venta = parseFloat(document.getElementById('ingVenta').value) || null;
    const proveedor = document.getElementById('ingProveedor').value.trim().toUpperCase() || null;
    const categoria = document.getElementById('ingCategoria').value.trim().toUpperCase() || 'GENERAL';
    const errDiv = document.getElementById('ingError');
    errDiv.style.display = 'none';
    if (!nombre) { errDiv.textContent = '⚠️ Nombre requerido'; errDiv.style.display = 'block'; return; }
    if (cantidad <= 0) { errDiv.textContent = '⚠️ Cantidad inválida'; errDiv.style.display = 'block'; return; }
    const btn = document.getElementById('ingBtnGuardar');
    btn.disabled = true; btn.textContent = '⏳ Guardando...';
    try {
        const payload = { nombre, cantidad, costo, venta, proveedor, categoria };
        const url = API_URL + '?action=ingresarMercaderia&data=' + encodeURIComponent(JSON.stringify(payload));
        const r = await fetch(url, { redirect: 'follow' });
        const resp = await r.json();
        if (resp.success) {
            // Actualizar local
            if (productoIngresoSel) {
                const p = productos.find(pr => pr.id === productoIngresoSel.id);
                if (p) { p.stock += cantidad; if (venta) p.price = venta; }
            }
            mostrarToast(resp.nuevo ? '✅ Producto creado' : '📦 Stock actualizado', 'verde');
            cerrarIngreso();
        } else { errDiv.textContent = '❌ ' + (resp.error || 'Error'); errDiv.style.display = 'block'; }
    } catch(e) { errDiv.textContent = '❌ Sin conexión'; errDiv.style.display = 'block'; }
    btn.disabled = false; btn.textContent = '📦 Guardar ingreso';
}

// ========== AJUSTE RÁPIDO ==========
function abrirAjuste() {
    ajusteProducto = null;
    document.getElementById('ajusteQ').value = '';
    document.getElementById('ajusteResultados').style.display = 'none';
    document.getElementById('ajustePanel').style.display = 'none';
    document.getElementById('modalAjuste').classList.add('open');
}
function cerrarAjuste() { document.getElementById('modalAjuste').classList.remove('open'); }

function buscarAjuste() {
    const q = document.getElementById('ajusteQ').value.toUpperCase().trim();
    const div = document.getElementById('ajusteResultados');
    document.getElementById('ajustePanel').style.display = 'none';
    if (q.length < 2) { div.style.display = 'none'; return; }
    const matches = productos.filter(p => p.name.includes(q)).slice(0, 12);
    if (!matches.length) { div.style.display = 'none'; return; }
    div.innerHTML = matches.map(p => {
        const c = colorStock(p.stock);
        return '<div onclick="seleccionarAjuste('+p.id+')" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f5f0ff;display:flex;align-items:center;gap:10px;background:'+c.bg+';">' +
            '<div style="flex:1;min-width:0;">' +
                '<div style="font-weight:700;font-size:0.88rem;color:'+c.text+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+p.name+'</div>' +
                '<div style="font-size:0.75rem;margin-top:2px;">'+badgeStock(p.stock)+' · $'+p.price.toLocaleString('es-AR')+'</div>' +
            '</div></div>';
    }).join('');
    div.style.display = 'block';
}

function seleccionarAjuste(id) {
    const p = productos.find(pr => pr.id === id);
    if (!p) return;
    ajusteProducto = p;
    ajusteValor = p.stock;
    document.getElementById('ajusteQ').value = p.name;
    document.getElementById('ajusteResultados').style.display = 'none';
    document.getElementById('ajusteNombre').textContent = p.name;
    document.getElementById('ajusteStockActual').innerHTML = badgeStock(p.stock) + ' · Precio: $' + p.price.toLocaleString('es-AR');
    document.getElementById('ajusteNuevo').textContent = ajusteValor;
    document.getElementById('ajustePrecioNuevo').value = p.price;
    document.getElementById('ajusteNombreNuevo').value = p.name;
    document.getElementById('ajusteCodigoNuevo').value = p.codigo || '';
    document.getElementById('ajustePanel').style.display = 'block';
}

function cambiarAjuste(delta) {
    ajusteValor = Math.max(0, ajusteValor + delta);
    document.getElementById('ajusteNuevo').textContent = ajusteValor;
}

async function guardarAjuste() {
    if (!ajusteProducto) return;
    const btn = document.getElementById('ajusteBtn');
    const nuevoStock = ajusteValor;
    const nuevoPrecio = parseFloat(document.getElementById('ajustePrecioNuevo').value) || ajusteProducto.price;
    const nuevoNombre = document.getElementById('ajusteNombreNuevo').value.trim().toUpperCase() || ajusteProducto.name;
    const nuevoCodigo = document.getElementById('ajusteCodigoNuevo').value.trim().toUpperCase() || ajusteProducto.codigo || '';
    btn.disabled = true; btn.textContent = '⏳ Guardando...';
    try {
        const payload = { id: ajusteProducto.id, stock: nuevoStock, precio: nuevoPrecio, nombre: nuevoNombre, codigo: nuevoCodigo };
        const url = API_URL + '?action=ajustarStock&data=' + encodeURIComponent(JSON.stringify(payload));
        const r = await fetch(url, { redirect: 'follow' });
        const resp = await r.json();
        if (resp.success) {
            ajusteProducto.stock = nuevoStock;
            ajusteProducto.price = nuevoPrecio;
            ajusteProducto.name = nuevoNombre;
            ajusteProducto.codigo = nuevoCodigo;
            mostrarToast('✅ Producto actualizado', 'verde');
            cerrarAjuste();
        }
    } catch(e) { mostrarToast('❌ Sin conexión', 'rojo'); }
    btn.disabled = false; btn.textContent = '💾 Guardar cambios';
}

// ========== RECORDATORIO CIERRE 22:05 ==========
function programarRecordatorioCierre() {
    if (!('Notification' in window)) return;
    const ahora = new Date();
    const cierre = new Date(); cierre.setHours(22, 5, 0, 0);
    if (ahora >= cierre) return;
    const ms = cierre - ahora;
    setTimeout(function() {
        const hoyKey = new Date().toISOString().slice(0, 10);
        const ventas = JSON.parse(localStorage.getItem('nalieggui_ventas_' + hoyKey) || '[]');
        if (!ventas.length) return;
        if (Notification.permission === 'granted') {
            new Notification('🔒 Nali Eggui', { body: '¡Son las 22:05! Cerrá el día.' });
        }
        mostrarToast('🔒 ¡Son las 22:05! Cerrá el día', 'naranja');
    }, ms);
}

// ========== ESTADÍSTICAS ==========
async function abrirEstadisticas() {
    document.getElementById('modalStats').classList.add('open');
    document.getElementById('statsContenido').innerHTML =
        '<div style="text-align:center;padding:40px;color:#bbb;"><div style="font-size:2rem;">⏳</div><div>Cargando...</div></div>';
    try {
        const url = API_URL + '?action=getEstadisticas';
        const r = await fetch(url, { redirect: 'follow' });
        const data = await r.json();
        renderEstadisticas(data);
    } catch(e) {
        document.getElementById('statsContenido').innerHTML =
            '<div style="text-align:center;padding:40px;color:var(--rojo);">❌ Sin conexión</div>';
    }
}

function cerrarEstadisticas() {
    document.getElementById('modalStats').classList.remove('open');
}

function renderEstadisticas(d) {
    const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');
    const mesesNom = { '01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic' };

    // Hoy por método
    const metodosHoy = Object.entries(d.hoy.metodos || {})
        .sort((a,b) => b[1]-a[1])
        .map(([m,t]) => '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ebf8;">' +
            '<span style="font-size:0.85rem;color:var(--gris);">' + m + '</span>' +
            '<strong style="color:var(--lavanda-dark);">' + fmt(t) + '</strong></div>').join('');

    // Mes por método
    const metodosMes = Object.entries(d.mes.metodos || {})
        .sort((a,b) => b[1]-a[1])
        .map(([m,t]) => '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ebf8;">' +
            '<span style="font-size:0.85rem;color:var(--gris);">' + m + '</span>' +
            '<strong style="color:var(--lavanda-dark);">' + fmt(t) + '</strong></div>').join('');

    // Top productos
    const maxTotal = d.topProductos.length ? d.topProductos[0].total : 1;
    const tops = (d.topProductos || []).map((p, i) => {
        const pct = Math.round((p.total / maxTotal) * 100);
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        return '<div style="margin-bottom:10px;">' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:3px;">' +
                '<span style="font-size:0.8rem;font-weight:700;color:var(--texto);">' + medal + ' ' + p.nombre.substring(0,30) + '</span>' +
                '<span style="font-size:0.8rem;color:var(--gris);">' + Math.round(p.qty) + ' u · ' + fmt(p.total) + '</span>' +
            '</div>' +
            '<div style="background:#f0ebf8;border-radius:20px;height:6px;">' +
                '<div style="background:linear-gradient(90deg,var(--lavanda),var(--naranja));border-radius:20px;height:6px;width:'+pct+'%;"></div>' +
            '</div></div>';
    }).join('');

    // Historial meses
    const maxMes = d.histMeses.length ? Math.max(...d.histMeses.map(m=>m.total)) : 1;
    const histHTML = (d.histMeses || []).slice(-6).reverse().map(m => {
        const [anio, mes] = m.mes.split('-');
        const pct = Math.round((m.total / maxMes) * 100);
        return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">' +
            '<span style="font-size:0.78rem;font-weight:700;color:var(--gris);min-width:36px;">' + (mesesNom[mes]||mes) + '</span>' +
            '<div style="flex:1;background:#f0ebf8;border-radius:20px;height:10px;">' +
                '<div style="background:linear-gradient(90deg,var(--lavanda-dark),var(--naranja));border-radius:20px;height:10px;width:'+pct+'%;"></div>' +
            '</div>' +
            '<span style="font-size:0.78rem;font-weight:700;color:var(--lavanda-dark);min-width:70px;text-align:right;">' + fmt(m.total) + '</span>' +
        '</div>';
    }).join('');

    document.getElementById('statsContenido').innerHTML =
        // HOY
        '<div style="margin:12px 14px;">' +
            '<div style="background:linear-gradient(135deg,var(--lavanda-dark),var(--lavanda));border-radius:16px;padding:16px;color:white;margin-bottom:14px;">' +
                '<div style="font-size:0.72rem;opacity:0.8;text-transform:uppercase;letter-spacing:1px;">Hoy</div>' +
                '<div style="font-family:serif;font-size:2rem;font-weight:900;">' + fmt(d.hoy.total) + '</div>' +
            '</div>' +
            (metodosHoy ? '<div style="background:white;border-radius:14px;padding:12px 14px;border:1px solid #ede8f5;margin-bottom:14px;">' +
                '<div style="font-size:0.72rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Por método</div>' +
                metodosHoy + '</div>' : '') +

        // MES
            '<div style="background:linear-gradient(135deg,var(--naranja),var(--naranja-dark));border-radius:16px;padding:16px;color:white;margin-bottom:14px;">' +
                '<div style="font-size:0.72rem;opacity:0.8;text-transform:uppercase;letter-spacing:1px;">Este mes</div>' +
                '<div style="font-family:serif;font-size:2rem;font-weight:900;">' + fmt(d.mes.total) + '</div>' +
            '</div>' +
            (metodosMes ? '<div style="background:white;border-radius:14px;padding:12px 14px;border:1px solid #ede8f5;margin-bottom:14px;">' +
                '<div style="font-size:0.72rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Por método</div>' +
                metodosMes + '</div>' : '') +

        // TOP PRODUCTOS
            (tops ? '<div style="background:white;border-radius:14px;padding:12px 14px;border:1px solid #ede8f5;margin-bottom:14px;">' +
                '<div style="font-size:0.72rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">🏆 Top productos (mes)</div>' +
                tops + '</div>' : '') +

        // HISTORIAL
            (histHTML ? '<div style="background:white;border-radius:14px;padding:12px 14px;border:1px solid #ede8f5;">' +
                '<div style="font-size:0.72rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">📅 Últimos 6 meses</div>' +
                histHTML + '</div>' : '') +
        '</div>';
}

if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
}

// ========== INIT ==========
cargarProductos().then(() => {
    programarRecordatorioCierre();
});
renderVenta();
</script>
